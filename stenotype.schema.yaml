# Rime schema
# encoding: utf-8

schema:
  schema_id: stenotype
  name: stenotype
  version: '0.0'
  author:
    - Bryan Chen <1chen0bryan@gmail.com>

switches:
  - name: ascii_mode
    reset: 0
    states: [ Steno, a ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - chord_composer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - reverse_lookup_translator

editor:
  bindings:
    BackSpace: back_syllable

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-*/"
  algebra:
    - xform|$|/|

translator:
  dictionary: stenotype-plover

chord_composer:
  alphabet: "1234567890qawsedrfcvtgyhnmujikolp;['"
  algebra:
    - "xlit|1234567890qawsedrfcvtgyhnmujikolp;['|##########sstkpwhrAO****EUFRPBLGTSDZ|"
    - "xform/#+/#/"
    - "xform/*+/*/"
    - "xform/ss/s/"
