# Rime schema
# encoding: utf-8

schema:
  schema_id: stenotype
  name: Stenotype
  version: '0.0'
  author:
    - Bryan Chen <1chen0bryan@gmail.com>

switches:
  - name: ascii_mode
    reset: 0
    states: [ ON, OFF ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - chord_composer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - lua_translator@*stenotype*tran
    - reverse_lookup_translator

editor:
  bindings:
    BackSpace: back_syllable

speller:
  alphabet: "ABCDEFGHIJKLMNOPQRSTUVWXYZ#-*/"
  algebra:
    - xform|$|/|

translator:
  dictionary: stenotype-plover
  enable_encode: false
  enable_sentence: false

chord_composer:
  alphabet: "qawsedrfcvtgyhnmujikolp;['"
  algebra:
    - "xlit|qawsedrfcvtgyhnmujikolp;['|#stkpwhrAO****EUFRPBLGTSDZ|"
    - "xform/^([FRPBLGTSDZ])/-$1/"
    - "xform/([#stkpwhr])([FRPBLGTSDZ])/$1-$2/"
    - "xform/[*]+/*/"
    - "xlit|stkpwhr|STKPWHR|"
  output_format:
    - "xform|$|/|"
